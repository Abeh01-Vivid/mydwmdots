# ~/.config/picom/picom.conf
# Minimal config for Intel Ironlake (Veriton X498G)

backend = "xrender";

# Shadows
shadow = false;

# Fading
fading = false;

# Transparency / Opacity
inactive-opacity = 0.7;
active-opacity = 1.0;
frame-opacity = 1.0;

# Blur — leave off, too heavy for Ironlake
blur-method = "none";

# Rounded corners — off for safety
corner-radius = 0;

# Vsync — xrender vsync can cause tearing on this GPU, test both
vsync = false;

# Damage tracking — helps performance on weak GPUs
use-damage = true;

# Log level
log-level = "warn";
